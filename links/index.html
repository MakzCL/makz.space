  <style>
    :root{
      --text:#fff;
      --muted:rgba(255,255,255,.58);
      --spring:cubic-bezier(.22,1,.36,1);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter, ui-rounded, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}

    main{
      width:min(1120px, calc(100% - 96px));
      min-height:100vh;
      margin:0 auto;
      padding:154px 0 96px;
      display:grid;
      align-items:center;
    }

    .links-shell{
      display:grid;
      grid-template-columns:minmax(0,.95fr) minmax(340px,.72fr);
      gap:44px;
      align-items:center;
    }

    .kicker{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
      color:rgba(255,255,255,.66);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:13px;
      font-weight:700;
    }

    .kicker::before{
      content:"";
      width:7px;
      height:7px;
      border-radius:999px;
      background:#fff;
      box-shadow:0 0 15px rgba(255,255,255,.8);
    }

    h1{
      max-width:760px;
      font-size:clamp(68px,9vw,128px);
      line-height:.88;
      letter-spacing:-.07em;
      filter:drop-shadow(0 22px 50px rgba(0,0,0,.42));
    }

    .intro{
      max-width:620px;
      margin-top:28px;
      color:var(--muted);
      line-height:1.72;
      font-size:clamp(17px,1.5vw,20px);
    }

    .social-panel{
      border-radius:34px;
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .social-link{
      min-height:72px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.07);
      display:grid;
      grid-template-columns:48px minmax(0,1fr) 28px;
      align-items:center;
      gap:16px;
      padding:0 18px;
      transition:transform .55s var(--spring), background .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .social-link:hover{
      transform:translateY(-3px);
      border-color:rgba(255,255,255,.24);
      background:rgba(255,255,255,.13);
      box-shadow:0 28px 70px rgba(0,0,0,.42), 0 0 42px rgba(255,255,255,.12);
    }

    .social-icon{
      width:48px;
      height:48px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#fff;
      color:#03050b;
      box-shadow:0 0 32px rgba(255,255,255,.14);
    }

    .social-icon svg{
      width:23px;
      height:23px;
      fill:currentColor;
    }

    .social-copy{
      min-width:0;
    }

    .social-copy strong{
      display:block;
      font-size:18px;
      letter-spacing:-.015em;
      margin-bottom:4px;
    }

    .social-copy span{
      display:block;
      color:var(--muted);
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .arrow{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      color:rgba(255,255,255,.78);
    }

    .arrow svg{
      width:20px;
      height:20px;
      fill:none;
      stroke:currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .liquid{
      border:1px solid rgba(255,255,255,.13);
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.055) 44%, rgba(255,255,255,.035)),
        rgba(8,10,18,.44);
      backdrop-filter:blur(24px) saturate(170%);
      -webkit-backdrop-filter:blur(24px) saturate(170%);
      box-shadow:
        0 22px 70px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.35),
        inset 0 -1px 0 rgba(255,255,255,.08);
    }

    @media (max-width:900px){
      main{width:calc(100% - 40px)}
      .links-shell{grid-template-columns:1fr}
    }

    @media (max-width:760px){
      main{width:calc(100% - 24px);padding-top:168px;padding-bottom:52px}
      h1{font-size:62px;line-height:.94;letter-spacing:0}
      .intro{font-size:15px;line-height:1.62}
      .social-panel{border-radius:26px;padding:16px}
      .social-link{
        min-height:66px;
        grid-template-columns:42px minmax(0,1fr) 24px;
        gap:13px;
        padding:0 14px;
        border-radius:18px;
      }
      .social-icon{width:42px;height:42px}
      .social-copy strong{font-size:16px}
    }

    @media (max-width:420px){
      h1{font-size:48px}
      .kicker{font-size:11px}
    }
  </style>
