<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>makz.space - Support</title>
  <link rel="icon" type="image/png" href="makz.space.favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    :root{
      --text:#fff;
      --muted:rgba(255,255,255,.58);
      --spring:cubic-bezier(.22,1,.36,1);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{
      min-height:100%;
      background:#03050b;
      color-scheme:dark;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter, ui-rounded, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      overflow-x:hidden;
      background:#03050b url("https://i.ibb.co/Z6DsR6gs/hq-makz-space.jpg") center center / cover fixed no-repeat;
      isolation:isolate;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(3,5,11,.08), rgba(3,5,11,.20) 56%, rgba(3,5,11,.34) 100%);
    }

    a{color:inherit;text-decoration:none}

    header{
      position:fixed;
      top:28px;
      left:64px;
      right:64px;
      z-index:50;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:start;
      pointer-events:none;
    }

    .logo{display:block;width:260px;max-width:30vw;height:auto}

    .icon-nav{
      pointer-events:auto;
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:999px;
      justify-self:center;
    }

    .icon-nav a{
      width:48px;
      height:48px;
      border-radius:999px;
      display:grid;
      place-items:center;
      opacity:.76;
    }

    .icon-nav a:hover,
    .icon-nav a.active{
      opacity:1;
      background:rgba(255,255,255,.12);
    }

    .icon-nav svg{
      width:21px;
      height:21px;
      fill:none;
      stroke:#fff;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
      display:block;
    }

    main{
      width:min(1100px, calc(100% - 110px));
      min-height:100vh;
      margin:0 auto;
      padding:154px 0 96px;
      display:grid;
      align-items:center;
    }

    .support-shell{
      display:grid;
      grid-template-columns:minmax(0,.9fr) minmax(360px,.6fr);
      gap:42px;
      align-items:stretch;
    }

    .support-copy{
      align-self:center;
    }

    .kicker{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
      color:rgba(255,255,255,.65);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:13px;
      font-weight:640;
    }

    .kicker::before{
      content:"";
      width:7px;
      height:7px;
      border-radius:999px;
      background:#fff;
      box-shadow:0 0 15px rgba(255,255,255,.8);
    }

    h1{
      font-size:clamp(62px,8vw,118px);
      line-height:.88;
      letter-spacing:-.07em;
      max-width:780px;
      filter:drop-shadow(0 22px 50px rgba(0,0,0,.42));
    }

    .intro{
      max-width:620px;
      margin-top:28px;
      color:var(--muted);
      line-height:1.7;
      font-size:clamp(17px,1.5vw,20px);
    }

    .discord-card{
      min-height:360px;
      border-radius:34px;
      padding:28px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .discord-mark{
      width:74px;
      height:74px;
      border-radius:24px;
      display:grid;
      place-items:center;
      background:#fff;
      color:#03050b;
      box-shadow:0 0 42px rgba(255,255,255,.16);
    }

    .discord-mark svg{
      width:38px;
      height:38px;
      fill:currentColor;
    }

    .discord-card h2{
      font-size:clamp(30px,3vw,46px);
      line-height:.98;
      letter-spacing:-.055em;
      margin-bottom:12px;
    }

    .discord-card p{
      color:var(--muted);
      line-height:1.62;
    }

    .join-btn{
      min-height:54px;
      padding:0 22px;
      border-radius:999px;
      border:1px solid #fff;
      background:#fff;
      color:#03050b;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:14px;
      font-weight:850;
      width:max-content;
      transition:transform .55s var(--spring), box-shadow .25s ease;
    }

    .join-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 28px 70px rgba(0,0,0,.42), 0 0 42px rgba(255,255,255,.16);
    }

    .join-btn svg{
      width:18px;
      height:18px;
      fill:none;
      stroke:#03050b;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .liquid{
      border:1px solid rgba(255,255,255,.13);
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.055) 44%, rgba(255,255,255,.035)),
        rgba(8,10,18,.44);
      backdrop-filter:blur(24px) saturate(170%);
      -webkit-backdrop-filter:blur(24px) saturate(170%);
      box-shadow:
        0 22px 70px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.35),
        inset 0 -1px 0 rgba(255,255,255,.08);
    }

    @media (max-width:900px){
      .support-shell{grid-template-columns:1fr}
    }

    @media (max-width:760px){
      main{width:calc(100% - 24px);padding-top:168px}
      h1{font-size:62px;line-height:.94;letter-spacing:0}
      .intro{font-size:15px;line-height:1.62}
      .discord-card{min-height:280px;border-radius:24px;padding:22px}
    }

    @media (max-width:420px){
      h1{font-size:44px}
      .join-btn{width:100%}
    }
  </style>

</head>
